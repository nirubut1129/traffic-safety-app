<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぶじにかえろう！</title>
<style>
:root {
  --sky-top:#29B6F6; --sky-bot:#E1F5FE;
  --asphalt:#3a3a3a; --asphalt-dark:#2e2e2e;
  --road-mark:#FFFDE7;
  --skin:#D4956A; --hair:#1a0e05;
  --uniform:#1E3A6E;
  --btn-red:#E53935; --btn-red-sh:#B71C1C;
  --btn-grn:#43A047; --btn-grn-sh:#2E7D32;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#111;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family:'Hiragino Kaku Gothic Pro','メイリオ','Yu Gothic',sans-serif;
}

#game {
  width:480px; height:720px;
  position:relative; overflow:hidden;
  border-radius:16px;
  box-shadow:0 24px 80px rgba(0,0,0,.9);
}

/* ── scene base ── */
.scene { display:none; position:absolute; inset:0; }
.scene.active { display:block; }

/* ══════════════════════════════════
   TITLE
══════════════════════════════════ */
#scene-title {
  background:linear-gradient(160deg,#FF8C00,#E53935 55%,#C62828);
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:28px; color:#fff;
}
#scene-title.active { display:flex; }
.t-badge {
  background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.5);
  border-radius:40px; padding:6px 20px; font-size:14px; letter-spacing:2px;
  margin-bottom:16px;
}
.t-emoji { font-size:86px; margin-bottom:4px; }
.t-main  { font-size:40px; font-weight:bold; text-shadow:3px 3px 0 rgba(0,0,0,.3); line-height:1.2; margin-bottom:6px; }
.t-sub   { font-size:17px; opacity:.9; margin-bottom:32px; line-height:1.6; }
.t-themes {
  font-size:15px; background:rgba(0,0,0,.25);
  border-radius:12px; padding:10px 18px; line-height:2.1; margin-bottom:24px;
}
.btn-start {
  background:#fff; color:#C62828; border:none;
  border-radius:50px; padding:18px 56px;
  font-size:26px; font-weight:bold; cursor:pointer;
  box-shadow:0 7px 0 rgba(0,0,0,.25);
  transition:transform .1s,box-shadow .1s;
}
.btn-start:active { transform:translateY(5px); box-shadow:0 2px 0 rgba(0,0,0,.2); }

/* ══════════════════════════════════
   WALK SCENE LAYOUT
══════════════════════════════════ */
#scene-walk { background:#2a4a1a; }

/* ── sky ── */
#sky {
  position:absolute; top:0; left:0; right:0; height:240px;
  background:linear-gradient(to bottom,var(--sky-top) 0%,#81D4FA 60%,var(--sky-bot) 100%);
}
.sun {
  position:absolute; top:28px; right:68px;
  width:60px; height:60px;
  background:radial-gradient(circle,#FFF176 30%,#FFD600);
  border-radius:50%;
  box-shadow:0 0 50px 14px rgba(255,215,0,.45);
}
.cloud {
  position:absolute; background:#fff; border-radius:50px;
  box-shadow:0 3px 8px rgba(0,0,0,.08);
}
.cloud::before,.cloud::after {
  content:''; position:absolute; background:#fff; border-radius:50%;
}
.c1 { width:88px; height:24px; top:30px; left:34px; }
.c1::before { width:44px; height:40px; top:-22px; left:8px; }
.c1::after  { width:34px; height:32px; top:-16px; left:44px; }
.c2 { width:70px; height:20px; top:60px; left:220px; }
.c2::before { width:36px; height:32px; top:-18px; left:6px; }
.c2::after  { width:28px; height:26px; top:-13px; left:36px; }

/* ── horizon scenery ── */
#horizon {
  position:absolute; top:190px; left:0; right:0; height:80px;
  display:flex; align-items:flex-end; overflow:hidden;
}
.bld {
  flex-shrink:0; border-radius:3px 3px 0 0; position:relative;
}
.bld::after {
  content:''; position:absolute; left:6px; right:6px; top:8px; height:11px;
  background:rgba(255,255,200,.7); border-radius:2px;
}
.bld::before {
  content:''; position:absolute; left:6px; right:6px; top:26px; height:11px;
  background:rgba(255,255,200,.5); border-radius:2px;
}
.tree { font-size:36px; line-height:1; flex-shrink:0; }

/* ── sidewalk strip ── */
#sidewalk {
  position:absolute; top:258px; left:0; right:0; height:14px;
  background:linear-gradient(to bottom,#BDBDBD,#9E9E9E);
}
#sidewalk::after {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(
    90deg, rgba(255,255,255,.2) 0,rgba(255,255,255,.2) 1px, transparent 1px, transparent 50px
  );
}

/* ── 3D ROAD ── */
#road-outer {
  position:absolute;
  top:258px; bottom:120px; left:0; right:0;
  perspective:320px;
  perspective-origin:50% 0%;
  overflow:hidden;
}
#road-plane {
  position:absolute;
  bottom:0; left:-80px; right:-80px;
  height:900px;
  background:var(--asphalt);
  transform:rotateX(72deg);
  transform-origin:bottom center;
  will-change:transform;
}
/* road shoulder (lighter edge bands) */
#road-plane::before,#road-plane::after {
  content:''; position:absolute; top:0; bottom:0; width:60px;
  background:#4a4a4a;
}
#road-plane::before { left:0; }
#road-plane::after  { right:0; }

/* edge lines */
.r-edge {
  position:absolute; top:0; bottom:0; width:5px;
  background:repeating-linear-gradient(to bottom,
    white 0,white 8px, transparent 8px,transparent 24px
  );
}
.r-edge-l { left:58px; }
.r-edge-r { right:58px; }

/* center dashes */
#lane-center {
  position:absolute; left:50%; top:0; bottom:0;
  transform:translateX(-50%);
  width:12px;
  background:repeating-linear-gradient(to bottom,
    var(--road-mark) 0,var(--road-mark) 40px,
    transparent 40px,transparent 80px
  );
  animation:laneScroll .65s linear infinite;
}
@keyframes laneScroll {
  from { background-position:0 0; }
  to   { background-position:0 80px; }
}

/* crosswalk stripes */
#crosswalk {
  position:absolute; left:40px; right:40px;
  bottom:140px; height:80px;
  display:none;
  background:repeating-linear-gradient(90deg,
    white 0,white 28px, transparent 28px,transparent 42px
  );
  border-top:4px solid white;
  border-bottom:4px solid white;
}

/* walking bob */
@keyframes walkBob {
  0%,100% { transform:rotateX(72deg) translateY(0); }
  50%      { transform:rotateX(72deg) translateY(-10px); }
}
.is-walking #road-plane { animation:walkBob .56s ease-in-out infinite; }
.is-walking #lane-center { animation:laneScroll .32s linear infinite; }

/* ── grass strips L / R ── */
.grass {
  position:absolute; top:270px; bottom:120px; width:65px;
  background:repeating-linear-gradient(
    to bottom,#4CAF50 0,#4CAF50 18px,#388E3C 18px,#388E3C 36px
  );
}
.grass-l { left:0; }
.grass-r { right:0; }

/* ══════════════════════════════════
   PLAYER SILHOUETTE
══════════════════════════════════ */
#player {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:300px; height:130px; pointer-events:none;
}
/* shoulders */
.p-shoulders {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:280px; height:88px;
  background:var(--uniform);
  border-radius:50% 50% 0 0 / 40% 40% 0 0;
}
/* collar */
.p-collar {
  position:absolute; bottom:82px; left:50%; transform:translateX(-50%);
  width:56px; height:28px;
  background:#fff;
  clip-path:polygon(0 0,100% 0,70% 100%,30% 100%);
  z-index:2;
}
/* neck */
.p-neck {
  position:absolute; bottom:86px; left:50%; transform:translateX(-50%);
  width:38px; height:36px;
  background:var(--skin);
  border-radius:0 0 18px 18px;
  z-index:1;
}
/* head back */
.p-head {
  position:absolute; bottom:92px; left:50%; transform:translateX(-50%);
  width:116px; height:106px;
  background:var(--hair);
  border-radius:58px 58px 28px 28px;
  z-index:2;
}
/* ears */
.p-ear {
  position:absolute; bottom:134px;
  width:24px; height:32px;
  background:var(--skin);
  border-radius:12px;
  z-index:1;
}
.p-ear-l { left:calc(50% - 66px); }
.p-ear-r { right:calc(50% - 66px); }
/* hair top tuft */
.p-hair-top {
  position:absolute; bottom:190px; left:50%; transform:translateX(-50%);
  width:80px; height:20px;
  background:var(--hair);
  border-radius:40px 40px 0 0;
  z-index:3;
}

/* ══════════════════════════════════
   FRIEND CHARACTER
══════════════════════════════════ */
#friend {
  position:absolute; bottom:200px; right:14px;
  font-size:64px; display:none; z-index:8;
}
@keyframes friendBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
#friend.active { display:block; animation:friendBob 1.2s ease-in-out infinite; }

/* ══════════════════════════════════
   EVENT CHARACTERS
══════════════════════════════════ */
#ev-car {
  position:absolute; font-size:76px; display:none; z-index:10;
  filter:drop-shadow(0 6px 8px rgba(0,0,0,.4));
}
@keyframes carCross {
  0%   { right:-120px; bottom:270px; font-size:58px; opacity:1; }
  45%  { right:120px;  bottom:296px; font-size:110px; }
  90%  { right:520px;  bottom:270px; font-size:58px; opacity:1; }
  100% { right:560px;  font-size:50px; opacity:0; }
}
#ev-car.crossing { display:block; animation:carCross 1.8s ease-in-out forwards; }

/* crosswalk car — slides across at road level */
#ev-crosscar {
  position:absolute; right:-100px; bottom:320px;
  font-size:80px; display:none; z-index:12;
  filter:drop-shadow(0 8px 10px rgba(0,0,0,.5));
  transition:right 1.4s ease-in-out;
}
#ev-crosscar.active { display:block; }

#ev-stranger-car {
  position:absolute; left:-130px; bottom:230px;
  font-size:74px; z-index:10; display:none;
  transition:left 1s ease-out;
  filter:drop-shadow(0 6px 8px rgba(0,0,0,.4));
}
#ev-stranger-car.active { display:block; left:4px; }

#ev-lurker {
  position:absolute; font-size:68px; display:none; z-index:8;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));
}
#ev-lurker.active { display:block; }

/* Speech bubbles */
.sbubble {
  position:absolute; background:#fff;
  border:2.5px solid #333; border-radius:12px;
  padding:9px 14px; font-size:15px; line-height:1.5;
  box-shadow:0 3px 12px rgba(0,0,0,.3); display:none; z-index:14;
}
#sb-stranger { left:88px; bottom:306px; }
#sb-friend   { right:82px; bottom:290px; text-align:right; }

/* dark overlay */
#dark-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0);
  pointer-events:none; z-index:6; transition:background 1.2s;
}
#dark-overlay.on { background:rgba(0,0,0,.68); }

/* ══════════════════════════════════
   UI — TIMER / WARNING / DIALOGUE
══════════════════════════════════ */
#timer-wrap {
  position:absolute; top:12px; left:12px; right:12px; height:18px;
  background:rgba(0,0,0,.35); border-radius:9px; overflow:hidden;
  display:none; z-index:20;
}
#timer-fill {
  height:100%; width:100%; border-radius:9px;
  background:linear-gradient(to right,#4CAF50,#FFEB3B 55%,#F44336 90%);
  transition:width .1s linear;
}

#warning {
  position:absolute; top:38px; left:50%; transform:translateX(-50%);
  font-size:26px; font-weight:bold; color:#F44336;
  text-shadow:2px 2px 0 #fff,-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff;
  white-space:nowrap; display:none; z-index:20;
}
@keyframes warnPulse { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.1);} }
#warning.on { display:block; animation:warnPulse .38s ease-in-out infinite; }

#dialogue {
  position:absolute; bottom:176px; left:10px; right:10px;
  background:rgba(255,255,255,.97);
  border:3px solid #333; border-radius:14px;
  padding:12px 16px;
  font-size:20px; line-height:1.75;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  display:none; z-index:12;
}
#dlg-name { font-size:13px; font-weight:bold; color:#E53935; margin-bottom:5px; }
#dlg-text { color:#1a1a1a; }

/* ── Next button ── */
#btn-next {
  position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
  background:var(--btn-grn); color:#fff; border:none;
  border-radius:50px; padding:16px 44px;
  font-size:21px; font-weight:bold; cursor:pointer;
  box-shadow:0 6px 0 var(--btn-grn-sh);
  display:none; z-index:15; white-space:nowrap;
}
#btn-next:active { transform:translateX(-50%) translateY(5px); box-shadow:0 1px 0 var(--btn-grn-sh); }

/* ── Single action button ── */
#btn-action {
  position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
  background:var(--btn-red); color:#fff; border:none;
  border-radius:14px; padding:20px 28px;
  font-size:22px; font-weight:bold; cursor:pointer;
  box-shadow:0 6px 0 var(--btn-red-sh);
  display:none; z-index:20;
  text-align:center; line-height:1.4; width:90%; max-width:420px;
}
@keyframes btnBounce {
  0%,100%{ transform:translateX(-50%) scale(1); box-shadow:0 6px 0 var(--btn-red-sh); }
  50%    { transform:translateX(-50%) scale(1.05); box-shadow:0 9px 0 var(--btn-red-sh); }
}
#btn-action.pulsing { animation:btnBounce .44s ease-in-out infinite; }
#btn-action:active  { transform:translateX(-50%) scale(.97)!important; animation:none!important; }

/* ── 2-choice buttons (crosswalk) ── */
#choice-wrap {
  position:absolute; bottom:18px; left:10px; right:10px;
  display:none; flex-direction:column; gap:10px; z-index:20;
}
.choice-btn {
  background:#1565C0; color:#fff; border:none;
  border-radius:14px; padding:16px 20px;
  font-size:19px; font-weight:bold; cursor:pointer;
  box-shadow:0 5px 0 #0D47A1; line-height:1.4; text-align:left;
  transition:filter .15s;
}
.choice-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #0D47A1; }
.choice-btn:hover  { filter:brightness(1.1); }
#choice-wrap.active { display:flex; }

/* progress dots */
#dots {
  position:absolute; top:10px; right:12px;
  display:none; gap:7px; z-index:15;
}
#dots.active { display:flex; }
.dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.3); border:2px solid rgba(255,255,255,.6);
}
.dot.done { background:#FFD600; border-color:#FFD600; }

/* ══════════════════════════════════
   GAME OVER
══════════════════════════════════ */
#scene-gameover {
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:26px; color:#fff;
  background:linear-gradient(135deg,#0d0d0d,#1a0808);
}
#scene-gameover.active { display:flex; }
.go-title  { font-size:48px; font-weight:bold; color:#FF5252; text-shadow:0 0 20px rgba(255,82,82,.5); margin-bottom:8px; }
.go-emoji  { font-size:76px; margin:10px 0; }
.go-what   { font-size:20px; line-height:1.8; margin-bottom:14px; color:#FFCCBC; }
.go-lesson {
  background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.25);
  border-radius:14px; padding:14px 18px;
  font-size:17px; line-height:2; color:#FFF9C4; margin-bottom:24px;
}
.btn-retry {
  background:#FF5252; color:#fff; border:none;
  border-radius:50px; padding:14px 42px;
  font-size:22px; font-weight:bold; cursor:pointer;
  box-shadow:0 5px 0 #C62828;
}
.btn-retry:active { transform:translateY(4px); box-shadow:0 1px 0 #C62828; }

/* ══════════════════════════════════
   VICTORY
══════════════════════════════════ */
#scene-victory {
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; overflow:hidden;
  background:linear-gradient(to bottom,#FFEFD5 0%,#FFD699 40%,#FFC46B 100%);
}
#scene-victory.active { display:flex; }

/* house CSS art */
#v-house {
  position:relative; margin-bottom:0; flex-shrink:0;
}
.h-roof {
  width:220px; height:0;
  border-left:22px solid transparent;
  border-right:22px solid transparent;
  border-bottom:80px solid #C0392B;
  margin:0 auto;
  position:relative; z-index:2;
}
.h-roof::after {
  content:''; position:absolute;
  top:10px; left:-14px; right:-14px; height:10px;
  background:#A93226; border-radius:2px;
}
.h-wall {
  width:180px; height:130px;
  background:#F5CBA7; margin:0 auto;
  position:relative; z-index:1;
  border:3px solid #E59866; border-top:none;
}
.h-door {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:46px; height:72px;
  background:#8B4513;
  border-radius:23px 23px 0 0;
  border:2px solid #6B3410;
}
.h-door::after {
  content:''; position:absolute;
  right:8px; top:50%;
  width:6px; height:6px;
  background:#FFD700; border-radius:50%;
}
.h-win { position:absolute; top:18px; width:38px; height:34px; background:#AED6F1; border:3px solid #85C1E9; border-radius:4px; }
.h-win-l { left:18px; }
.h-win-r { right:18px; }
.h-win::after {
  content:''; position:absolute; left:50%; top:0; transform:translateX(-50%);
  width:2px; height:100%; background:#85C1E9;
}
.h-win::before {
  content:''; position:absolute; top:50%; left:0; transform:translateY(-50%);
  width:100%; height:2px; background:#85C1E9;
}
.h-path {
  width:50px; height:22px;
  background:#D5D8DC; margin:0 auto;
  border-left:3px solid #AAB7B8; border-right:3px solid #AAB7B8;
}

/* mom CSS art */
#v-mom {
  position:absolute;
  bottom:130px;    /* inside doorway area */
  left:50%;
  transform:translateX(-50%) translateX(-1px);
  width:60px; height:80px;
  z-index:10;
}
.m-head {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:36px; height:36px;
  background:var(--skin);
  border-radius:50%;
}
.m-hair {
  position:absolute; top:-5px; left:50%; transform:translateX(-50%);
  width:40px; height:22px;
  background:#3D1E0E;
  border-radius:20px 20px 0 0;
}
.m-hair::after {
  content:''; position:absolute; bottom:-2px; left:-4px;
  width:10px; height:20px;
  background:#3D1E0E; border-radius:0 0 8px 8px;
}
.m-hair::before {
  content:''; position:absolute; bottom:-2px; right:-4px;
  width:10px; height:20px;
  background:#3D1E0E; border-radius:0 0 8px 8px;
}
.m-eye-l,.m-eye-r {
  position:absolute; top:14px;
  width:5px; height:6px;
  background:#1a0e05; border-radius:50%;
}
.m-eye-l { left:6px; }
.m-eye-r { right:6px; }
.m-smile {
  position:absolute; top:23px; left:50%; transform:translateX(-50%);
  width:14px; height:7px;
  border-bottom:2px solid #8B4513;
  border-radius:0 0 8px 8px;
}
.m-body {
  position:absolute; top:32px; left:50%; transform:translateX(-50%);
  width:42px; height:48px;
  background:#E91E63;
  border-radius:10px 10px 6px 6px;
}
.m-apron {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:30px; height:34px;
  background:rgba(255,255,255,.75);
  border-radius:4px 4px 8px 8px;
}
/* arms out welcoming */
.m-arm-l,.m-arm-r {
  position:absolute; top:34px;
  width:10px; height:32px;
  background:#E91E63; border-radius:5px;
}
.m-arm-l { left:2px;  transform:rotate(40deg); transform-origin:top center; }
.m-arm-r { right:2px; transform:rotate(-40deg); transform-origin:top center; }

/* mom speech bubble */
#v-speech {
  background:#fff; border:2.5px solid #333;
  border-radius:12px; padding:8px 14px;
  font-size:18px; font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,.2);
  margin-bottom:6px; color:#333;
}

.v-title {
  font-size:32px; font-weight:bold;
  color:#7B341E;
  text-shadow:1px 1px 0 rgba(255,255,255,.6);
  margin:6px 0;
}
.v-lessons {
  background:rgba(255,255,255,.7);
  border-radius:14px; padding:12px 18px;
  text-align:left; font-size:16px; line-height:2.1;
  color:#333; margin:8px 0 14px;
}
.btn-again {
  background:#E53935; color:#fff; border:none;
  border-radius:50px; padding:14px 40px;
  font-size:21px; font-weight:bold; cursor:pointer;
  box-shadow:0 5px 0 #B71C1C; margin-top:4px;
}
.btn-again:active { transform:translateY(4px); box-shadow:0 1px 0 #B71C1C; }

/* confetti */
@keyframes cfFall { from{transform:translateY(-30px) rotate(0);opacity:1;} to{transform:translateY(760px) rotate(720deg);opacity:0;} }
.cf { position:absolute; font-size:20px; animation:cfFall linear infinite; pointer-events:none; }

/* responsive */
@media(max-height:740px){ #game{transform:scale(.88);transform-origin:top center;} }
@media(max-height:640px){ #game{transform:scale(.76);transform-origin:top center;} }
@media(max-width:500px) { #game{width:100vw;height:100vh;border-radius:0;} }
</style>
</head>
<body>
<div id="game">

<!-- ═══ TITLE ═══ -->
<div id="scene-title" class="scene active">
  <div class="t-badge">🎮 あんぜんゲーム</div>
  <div class="t-emoji">🏫➡️🏠</div>
  <div class="t-main">ぶじに<br>かえろう！</div>
  <div class="t-sub">がっこうから おうちまで<br>あんぜんに かえれるかな？</div>
  <div class="t-themes">
    🚗 こうつうあんぜん<br>
    👹 しらないひと<br>
    🌑 くらいみち
  </div>
  <button class="btn-start" onclick="startGame()">▶ はじめる！</button>
</div>

<!-- ═══ WALK SCENE ═══ -->
<div id="scene-walk" class="scene">

  <!-- environment -->
  <div id="sky">
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
  </div>

  <div id="horizon">
    <div class="tree">🌳</div>
    <div class="bld" style="width:44px;height:64px;background:#EF9A9A;"></div>
    <div class="bld" style="width:52px;height:76px;background:#90CAF9;"></div>
    <div class="tree">🌳</div>
    <div class="bld" style="width:46px;height:58px;background:#FFCC80;"></div>
    <div class="tree">🌲</div>
    <div class="bld" style="width:48px;height:70px;background:#A5D6A7;"></div>
    <div class="tree">🌳</div>
    <div class="bld" style="width:40px;height:60px;background:#CE93D8;"></div>
    <div class="tree">🌲</div>
  </div>

  <div id="sidewalk"></div>

  <!-- 3D road -->
  <div id="road-outer">
    <div id="road-plane">
      <div class="r-edge r-edge-l"></div>
      <div class="r-edge r-edge-r"></div>
      <div id="lane-center"></div>
      <div id="crosswalk"></div>
    </div>
  </div>

  <div class="grass grass-l"></div>
  <div class="grass grass-r"></div>

  <!-- event elements -->
  <div id="ev-car">🚗</div>
  <div id="ev-crosscar">🚗</div>
  <div id="ev-stranger-car">🚗</div>
  <div id="ev-lurker">👹</div>
  <div id="dark-overlay"></div>

  <div class="sbubble" id="sb-stranger">
    👹「みちを おしえて！」
  </div>
  <div class="sbubble" id="sb-friend">
    👧「こっちから<br>かえろうよ！」
  </div>

  <!-- friend -->
  <div id="friend">👧</div>

  <!-- progress dots -->
  <div id="dots" class="active">
    <div class="dot" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <!-- player silhouette -->
  <div id="player">
    <div class="p-hair-top"></div>
    <div class="p-ear p-ear-l"></div>
    <div class="p-ear p-ear-r"></div>
    <div class="p-head"></div>
    <div class="p-neck"></div>
    <div class="p-collar"></div>
    <div class="p-shoulders"></div>
  </div>

  <!-- UI -->
  <div id="timer-wrap"><div id="timer-fill"></div></div>
  <div id="warning"></div>

  <div id="dialogue">
    <div id="dlg-name"></div>
    <div id="dlg-text"></div>
  </div>

  <button id="btn-next" onclick="nextStep()">つぎへ ▶</button>
  <button id="btn-action" onclick="pressAction()"></button>

  <div id="choice-wrap">
    <button class="choice-btn" id="choice-a" onclick="choiceA()"></button>
    <button class="choice-btn" id="choice-b" onclick="choiceB()"></button>
  </div>

</div><!-- /scene-walk -->

<!-- ═══ GAME OVER ═══ -->
<div id="scene-gameover" class="scene">
  <div class="go-title">ゲームオーバー 😱</div>
  <div class="go-emoji" id="go-emoji">💥</div>
  <div class="go-what"  id="go-what"></div>
  <div class="go-lesson" id="go-lesson"></div>
  <button class="btn-retry" onclick="restartGame()">🔄 もういちど</button>
</div>

<!-- ═══ VICTORY ═══ -->
<div id="scene-victory" class="scene">
  <div id="v-speech">「おかえり！ よくがんばったね！」</div>
  <div id="v-house">
    <div class="h-roof"></div>
    <div class="h-wall">
      <div class="h-win h-win-l"></div>
      <div class="h-win h-win-r"></div>
      <div class="h-door"></div>
    </div>
    <div class="h-path"></div>
    <!-- mom inside door -->
    <div id="v-mom">
      <div class="m-hair"></div>
      <div class="m-head">
        <div class="m-eye-l"></div>
        <div class="m-eye-r"></div>
        <div class="m-smile"></div>
      </div>
      <div class="m-body">
        <div class="m-apron"></div>
        <div class="m-arm-l"></div>
        <div class="m-arm-r"></div>
      </div>
    </div>
  </div>
  <div class="v-title">ぶじにかえれた！🎉</div>
  <div class="v-lessons">
    ✅ かどでは いちどとまる<br>
    ✅ みぎ・ひだり・みぎを かくにん！<br>
    ✅ しらないひとには ついていかない<br>
    ✅ くらいみちには いかない
  </div>
  <button class="btn-again" onclick="restartGame()">🎮 もういちどあそぶ</button>
</div>

</div><!-- /game -->

<script>
/* ════════════════════════════
   STATE
════════════════════════════ */
let stepIndex  = 0;
let timerRAF   = null;
let timerEnd   = 0;
let actionReady = false;
let actionDone  = false;
let currentEvent = null;
let crosswalkCorrect = false; // which choice is correct for crosswalk

/* ════════════════════════════
   SCRIPT
════════════════════════════ */
const SCRIPT = [
  // ── intro ──
  { type:'dialogue', speaker:'', text:'がっこうが おわったよ。\nおうちに かえろう！', friend:false },
  { type:'dialogue', speaker:'ともこ', text:'いっしょに かえろうよ！', friend:true },
  { type:'dialogue', speaker:'', text:'このまちに おにが いるよ。\nきをつけよう！', friend:true },

  // ── event 1: car at corner ──
  { type:'dialogue', speaker:'', text:'まがりかどだよ。\nくるまに きをつけよう！', friend:true },
  {
    type:'event', id:'car',
    warn:'🚗 くるまが くる！！',
    btnText:'🛑　とまれ！',
    timeLimit:4000,
    failEmoji:'💥',
    failWhat:'くるまに ぶつかってしまった…',
    failLesson:'🚗 まがりかどでは かならず いちどとまる！\nみぎ・ひだり・みぎを みてから すすもう！',
  },
  { type:'dot', dot:0 },
  { type:'dialogue', speaker:'ともこ', text:'よかった！ちゃんと とまれたね！', friend:true },

  // ── event 2: crosswalk (2-choice) ──
  { type:'dialogue', speaker:'', text:'おうだんほどうだよ。\nどうやって わたる？', friend:true },
  {
    type:'crosswalk',
    choiceA:'てをあげて　わたる',
    choiceB:'みぎ・ひだり・みぎ をみてから\nてをあげて　わたる',
    correct:'B',
    failEmoji:'🚗',
    failWhat:'くるまに はねられてしまった！\nかくにんが たりなかった…',
    failLesson:'🚦 おうだんほどうでも まずとまる！\nみぎ→ひだり→みぎ をかくにんして\nてをあげて わたろう！',
  },
  { type:'dot', dot:1 },
  { type:'dialogue', speaker:'ともこ', text:'ちゃんと みてて よかったね！', friend:true },

  // ── event 3: stranger ──
  { type:'dialogue', speaker:'', text:'くるまが ちかづいてきたよ。', friend:true },
  {
    type:'event', id:'stranger',
    warn:'⚠️ しらないひと！！',
    btnText:'🙅 ごめんなさい！\nおとなに きいてね！',
    timeLimit:4000,
    failEmoji:'😱',
    failWhat:'くるまに つれていかれた…',
    failLesson:'🚨 しらないひとには ついていかない！\n「ぼうはん ぶざー」を ならそう！\n「たすけて！」と おおきな こえで さけぼう！',
  },
  { type:'dot', dot:2 },
  { type:'dialogue', speaker:'ともこ', text:'えらい！ちゃんと ことわれたね！', friend:true },

  // ── event 4: dark road ──
  {
    type:'event', id:'darkroad',
    warn:'⚠️ あぶない みちだ！',
    btnText:'🌟 いつもの みちで かえる！',
    timeLimit:3800,
    showFriendSpeech:true,
    failEmoji:'🌑',
    failWhat:'くらいみちで おにに つかまった！',
    failLesson:'🌑 くらいみちは いかない！\nひとのいない みちも あぶないよ。\nいつもの あかるい みちを とおろう！',
  },
  { type:'dot', dot:3 },
  { type:'dialogue', speaker:'ともこ', text:'そうだよ！いつもの みちがいい！', friend:true },

  // ── home ──
  { type:'dialogue', speaker:'', text:'もうすぐ おうちだ！\nきょうも ぶじに かえれたよ！', friend:true },
  { type:'victory' },
];

/* ════════════════════════════
   HELPERS
════════════════════════════ */
function showScene(id) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('scene-' + id).classList.add('active');
}

function setWalking(on) {
  const w = document.getElementById('scene-walk');
  on ? w.classList.add('is-walking') : w.classList.remove('is-walking');
}

function showDialogue(speaker, text, withNext) {
  document.getElementById('dlg-name').textContent = speaker ? '【 ' + speaker + ' 】' : '';
  document.getElementById('dlg-text').textContent = text;
  document.getElementById('dialogue').style.display = 'block';
  document.getElementById('btn-next').style.display = withNext ? 'block' : 'none';
}
function hideDialogue() {
  document.getElementById('dialogue').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
}

function setFriend(on) {
  const f = document.getElementById('friend');
  on ? f.classList.add('active') : f.classList.remove('active');
}

function resetEventUI() {
  stopTimer();
  const ids = ['ev-car','ev-crosscar','ev-stranger-car','ev-lurker'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('crossing','active');
    el.style.cssText = '';
    el.style.display = 'none';
  });
  document.getElementById('crosswalk').style.display = 'none';
  document.getElementById('dark-overlay').classList.remove('on');
  document.getElementById('sb-stranger').style.display = 'none';
  document.getElementById('sb-friend').style.display = 'none';
  document.getElementById('warning').classList.remove('on');
  document.getElementById('timer-wrap').style.display = 'none';
  document.getElementById('btn-action').classList.remove('pulsing');
  document.getElementById('btn-action').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('dialogue').style.display = 'none';
  document.getElementById('choice-wrap').classList.remove('active');
}

/* ════════════════════════════
   TIMER
════════════════════════════ */
function startTimer(ms, onExpire) {
  timerEnd = performance.now() + ms;
  document.getElementById('timer-wrap').style.display = 'block';
  function tick() {
    const rem = timerEnd - performance.now();
    document.getElementById('timer-fill').style.width = Math.max(0, rem / ms * 100) + '%';
    if (rem <= 0) {
      document.getElementById('timer-wrap').style.display = 'none';
      onExpire();
      return;
    }
    timerRAF = requestAnimationFrame(tick);
  }
  timerRAF = requestAnimationFrame(tick);
}
function stopTimer() {
  if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
  document.getElementById('timer-wrap').style.display = 'none';
}

/* ════════════════════════════
   GAME OVER
════════════════════════════ */
function triggerGameOver(ev) {
  stopTimer();
  resetEventUI();
  setWalking(false);
  document.getElementById('go-emoji').textContent  = ev.failEmoji;
  document.getElementById('go-what').textContent   = ev.failWhat;
  document.getElementById('go-lesson').textContent = ev.failLesson;
  showScene('gameover');
}

/* ════════════════════════════
   EVENT: CAR
════════════════════════════ */
function runEventCar(ev) {
  currentEvent = ev;
  actionDone = false;

  const warn = document.getElementById('warning');
  warn.textContent = ev.warn;
  warn.classList.add('on');

  // Animate car after 0.5s
  setTimeout(() => {
    const car = document.getElementById('ev-car');
    car.textContent = '🚗';
    car.classList.add('crossing');
  }, 500);

  // Show button
  setTimeout(() => {
    const btn = document.getElementById('btn-action');
    btn.textContent = ev.btnText;
    btn.style.display = 'block';
    btn.classList.add('pulsing');
    actionReady = true;
    startTimer(ev.timeLimit, () => { if (!actionDone) triggerGameOver(ev); });
  }, 600);
}

/* ════════════════════════════
   EVENT: STRANGER
════════════════════════════ */
function runEventStranger(ev) {
  currentEvent = ev;
  actionDone = false;
  setWalking(false);

  const warn = document.getElementById('warning');
  warn.textContent = ev.warn;

  // Stranger car slides in
  const sc = document.getElementById('ev-stranger-car');
  sc.style.display = 'block';
  sc.textContent = '🚗';
  requestAnimationFrame(() => sc.classList.add('active'));

  setTimeout(() => {
    document.getElementById('sb-stranger').style.display = 'block';
    warn.classList.add('on');
  }, 900);

  setTimeout(() => {
    const btn = document.getElementById('btn-action');
    btn.textContent = ev.btnText;
    btn.style.display = 'block';
    btn.classList.add('pulsing');
    actionReady = true;
    startTimer(ev.timeLimit, () => { if (!actionDone) triggerGameOver(ev); });
  }, 1100);
}

/* ════════════════════════════
   EVENT: DARK ROAD
════════════════════════════ */
function runEventDarkroad(ev) {
  currentEvent = ev;
  actionDone = false;
  setWalking(false);

  if (ev.showFriendSpeech) document.getElementById('sb-friend').style.display = 'block';

  setTimeout(() => {
    document.getElementById('dark-overlay').classList.add('on');
    setTimeout(() => {
      const lurker = document.getElementById('ev-lurker');
      lurker.style.cssText = 'bottom:268px; left:175px;';
      lurker.style.display = 'block';
      lurker.classList.add('active');

      const warn = document.getElementById('warning');
      warn.textContent = ev.warn;
      warn.classList.add('on');

      const btn = document.getElementById('btn-action');
      btn.textContent = ev.btnText;
      btn.style.display = 'block';
      btn.classList.add('pulsing');
      actionReady = true;
      startTimer(ev.timeLimit, () => { if (!actionDone) triggerGameOver(ev); });
    }, 900);
  }, 700);
}

/* ════════════════════════════
   EVENT: CROSSWALK (2-choice)
════════════════════════════ */
function runEventCrosswalk(ev) {
  currentEvent = ev;
  setWalking(false);
  document.getElementById('crosswalk').style.display = 'block';

  document.getElementById('choice-a').textContent = '❌  ' + ev.choiceA;
  document.getElementById('choice-b').textContent = '👉  ' + ev.choiceB;

  // Show dialogue prompt
  showDialogue('', 'どうやって わたる？', false);

  setTimeout(() => {
    document.getElementById('choice-wrap').classList.add('active');
  }, 500);
}

function choiceA() {
  const ev = currentEvent;
  if (!ev) return;
  if (ev.correct === 'A') {
    onCrosswalkSuccess(ev);
  } else {
    // Wrong: car hits
    document.getElementById('choice-wrap').classList.remove('active');
    hideDialogue();
    const car = document.getElementById('ev-crosscar');
    car.textContent = '🚗';
    car.style.display = 'block';
    // car slides in from right
    requestAnimationFrame(() => { car.style.right = '100px'; });
    setTimeout(() => { triggerGameOver(ev); }, 1200);
  }
}

function choiceB() {
  const ev = currentEvent;
  if (!ev) return;
  if (ev.correct === 'B') {
    onCrosswalkSuccess(ev);
  } else {
    document.getElementById('choice-wrap').classList.remove('active');
    hideDialogue();
    const car = document.getElementById('ev-crosscar');
    car.textContent = '🚗';
    car.style.display = 'block';
    requestAnimationFrame(() => { car.style.right = '100px'; });
    setTimeout(() => { triggerGameOver(ev); }, 1200);
  }
}

function onCrosswalkSuccess(ev) {
  document.getElementById('choice-wrap').classList.remove('active');
  hideDialogue();

  // Show car passing in front
  const car = document.getElementById('ev-crosscar');
  car.textContent = '🚗';
  car.style.display = 'block';
  car.style.right = '-110px';
  // Slight delay then zoom across
  setTimeout(() => {
    car.style.transition = 'right 1.4s ease-in-out';
    car.style.right = '520px';
    showDialogue('', 'くるまが すぎていった！\nちゃんと みてて よかった！', false);
    setTimeout(() => {
      hideDialogue();
      car.style.display = 'none';
      document.getElementById('crosswalk').style.display = 'none';
      setWalking(true);
      stepIndex++;
      runStep();
    }, 1800);
  }, 400);
}

/* ════════════════════════════
   ACTION BUTTON PRESSED
════════════════════════════ */
function pressAction() {
  if (!actionReady || actionDone) return;
  actionDone = true;
  actionReady = false;
  stopTimer();

  const btn = document.getElementById('btn-action');
  btn.classList.remove('pulsing');
  btn.style.background = '#43A047';
  btn.style.boxShadow  = '0 6px 0 #2E7D32';
  btn.textContent = '✅ セーフ！';

  document.getElementById('warning').classList.remove('on');
  document.getElementById('dark-overlay').classList.remove('on');
  document.getElementById('sb-stranger').style.display = 'none';

  setTimeout(() => {
    // restore button style for next use
    btn.style.background = '';
    btn.style.boxShadow  = '';
    resetEventUI();
    setWalking(true);
    stepIndex++;
    runStep();
  }, 1300);
}

/* ════════════════════════════
   STEP RUNNER
════════════════════════════ */
function runStep() {
  if (stepIndex >= SCRIPT.length) { showScene('victory'); spawnConfetti(); return; }
  const step = SCRIPT[stepIndex];

  if (step.type === 'dialogue') {
    setFriend(step.friend !== false);
    setWalking(true);
    showDialogue(step.speaker, step.text, true);
    return;
  }
  if (step.type === 'dot') {
    const d = document.getElementById('dot' + step.dot);
    if (d) d.classList.add('done');
    stepIndex++; runStep(); return;
  }
  if (step.type === 'event') {
    resetEventUI(); setWalking(true); actionReady = false;
    if (step.id === 'car')      runEventCar(step);
    if (step.id === 'stranger') runEventStranger(step);
    if (step.id === 'darkroad') runEventDarkroad(step);
    return;
  }
  if (step.type === 'crosswalk') {
    resetEventUI(); runEventCrosswalk(step); return;
  }
  if (step.type === 'victory') {
    showScene('victory'); spawnConfetti(); return;
  }
}

function nextStep() { stepIndex++; runStep(); }

/* ════════════════════════════
   CONFETTI
════════════════════════════ */
function spawnConfetti() {
  const v = document.getElementById('scene-victory');
  '🌟⭐🎉🎊✨🎈🏆'.split('').forEach((e, i) => {
    const c = document.createElement('div');
    c.className = 'cf';
    c.textContent = e;
    c.style.left = (8 + i * 13) + '%';
    c.style.animationDuration = (2.4 + Math.random() * 2) + 's';
    c.style.animationDelay    = (Math.random() * 1.8) + 's';
    v.appendChild(c);
  });
}

/* ════════════════════════════
   START / RESTART
════════════════════════════ */
function startGame() {
  stepIndex = 0;
  actionReady = actionDone = false;
  currentEvent = null;
  ['dot0','dot1','dot2','dot3'].forEach(id => {
    const d = document.getElementById(id);
    if (d) d.classList.remove('done');
  });
  const btn = document.getElementById('btn-action');
  btn.style.background = '';
  btn.style.boxShadow  = '';
  resetEventUI();
  showScene('walk');
  setFriend(false);
  setWalking(true);
  runStep();
}

function restartGame() {
  document.querySelectorAll('.cf').forEach(c => c.remove());
  showScene('title');
}
</script>
</body>
</html>
